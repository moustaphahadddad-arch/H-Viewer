name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v1

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Build Release AAB (Bundle)
        run: |
          ./gradlew bundleRelease --no-daemon

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          
          echo "## H-Viewer Release $VERSION" > release_notes.md
          echo "" >> release_notes.md
          echo "### ✨ Features" >> release_notes.md
          echo "- Updated to Android 14 (API 34)" >> release_notes.md
          echo "- Modernized with Jetpack Compose" >> release_notes.md
          echo "- Material Design 3 UI" >> release_notes.md
          echo "- Retrofit 2.10.0 for networking" >> release_notes.md
          echo "- Jsoup 1.16.2 for HTML parsing" >> release_notes.md
          echo "- Coil image loading library" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 📦 Dependencies Updated" >> release_notes.md
          echo "- OkHttp: 3.7.0 → 4.11.0" >> release_notes.md
          echo "- Dagger: 2.0 → 2.48.1" >> release_notes.md
          echo "- Gradle: AGP 3.0.1 → 8.2.0" >> release_notes.md
          echo "- Kotlin: 1.9.22" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 📥 Installation" >> release_notes.md
          echo "- Download the APK file below for direct installation" >> release_notes.md
          echo "- Or download the AAB for Google Play distribution" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/release/*-release.apk
            app/build/outputs/bundle/release/app-release.aab
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v3
        with:
          name: h-viewer-apk
          path: app/build/outputs/apk/release/*-release.apk
          retention-days: 90

      - name: Upload AAB to artifacts
        uses: actions/upload-artifact@v3
        with:
          name: h-viewer-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
          cache: gradle

      - name: Run unit tests
        run: |
          chmod +x gradlew
          ./gradlew test --no-daemon

      - name: Run lint
        run: |
          ./gradlew lint --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-reports
          path: app/build/reports/
          retention-days: 30

  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
          cache: gradle

      - name: Run Lint Analysis
        run: |
          chmod +x gradlew
          ./gradlew lintRelease --no-daemon || true

      - name: Upload Lint Reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: lint-reports
          path: app/build/reports/lint-results-release.html
          retention-days: 30
